<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Drink Tracker</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css?v=1.6">
</head>

<body onload="javascript:StartFunc()">
    <div id="mainContainer">
        <div id="totalContainer">
            <span class="total-label">TOTAL</span>
            <div class="total-amount-box">
                <span id="totalPrice">0.00</span><span class="currency"> ₺</span>
            </div>
        </div>
        <div class="itemContainer" id="Beer">
            <img src="img/beer.png" id="itemImage">
            <p id="drinkName">Beer</p>
            <p id="beerAmount" , class="amount">0</p>
            <div id="buttonContainer">
                <button onclick="appendToDrink(beerAmount)" , id="add">+</button>
                <button onclick="deductFromDrink(beerAmount)" , id="sub">-</button>
            </div>

        </div>

        <div class="itemContainer" id="Gin">
            <img src="img/gin-tonic.png" id="itemImage">
            <p id="drinkName">Gin</p>
            <p id="ginAmount" , class="amount">0</p>
            <div id="buttonContainer">
                <button onclick="appendToDrink(ginAmount)" , id="add">+</button>
                <button onclick="deductFromDrink(ginAmount)" , id="sub">-</button>
            </div>

        </div>

        <div class="itemContainer" id="Cocktail">
            <img src="img/cocktail.png" id="itemImage">
            <p id="drinkName">Cocktail</p>
            <p id="cocktailAmount" , class="amount">0</p>
            <div id="buttonContainer">
                <button onclick="appendToDrink(cocktailAmount)" , id="add">+</button>
                <button onclick="deductFromDrink(cocktailAmount)" , id="sub">-</button>
            </div>

        </div>

        <div class="itemContainer" id="Shot">
            <img src="img/shot.png" id="itemImage">
            <p id="drinkName">Shot</p>
            <p id="shotAmount" , class="amount">0</p>
            <div id="buttonContainer">
                <button onclick="appendToDrink(shotAmount)" , id="add">+</button>
                <button onclick="deductFromDrink(shotAmount)" , id="sub">-</button>
            </div>

        </div>

        <div class="itemContainer" id="Water">
            <img src="img/water.png" id="itemImage">
            <p id="drinkName">Water</p>
            <p id="waterAmount" , class="amount">0</p>
            <div id="buttonContainer">
                <button onclick="appendToDrink(waterAmount)" , id="add">+</button>
                <button onclick="deductFromDrink(waterAmount)" , id="sub">-</button>
            </div>

        </div>

        <div class="itemContainer" id="Nuts">
            <img src="img/cashew.png" id="itemImage">
            <p id="drinkName">Nuts</p>
            <p id="nutsAmount" , class="amount">0</p>
            <div id="buttonContainer">
                <button onclick="appendToDrink(nutsAmount)" , id="add">+</button>
                <button onclick="deductFromDrink(nutsAmount)" , id="sub">-</button>
            </div>

        </div>

        <div class="itemContainer" id="Popcorn">
            <img src="img/popcorn.png" id="itemImage">
            <p id="drinkName">PopCorn</p>
            <p id="pCornAmount" , class="amount">0</p>
            <div id="buttonContainer">
                <button onclick="appendToDrink(pCornAmount)" , id="add">+</button>
                <button onclick="deductFromDrink(pCornAmount)" , id="sub">-</button>
            </div>

        </div>

        <div class="itemContainer" id="Pickles">
            <img src="img/pickles.png" id="itemImage">
            <p id="drinkName">Pickles</p>
            <p id="picklesAmount" , class="amount">0</p>
            <div id="buttonContainer">
                <button onclick="appendToDrink(picklesAmount)" , id="add">+</button>
                <button onclick="deductFromDrink(picklesAmount)" , id="sub">-</button>
            </div>

        </div>


        <div class="itemContainer" id="Food">
            <img src="img/food.png" id="itemImage">
            <p id="drinkName">Food</p>
            <p id="foodAmount" , class="amount">0</p>
            <div id="buttonContainer">
                <button onclick="appendToDrink(foodAmount)" , id="add">+</button>
                <button onclick="deductFromDrink(foodAmount)" , id="sub">-</button>
            </div>

        </div>

        <div class="itemContainer" id="Fries">
            <img src="img/fries.png" id="itemImage">
            <p id="drinkName">Fries</p>
            <p id="friesAmount" , class="amount">0</p>
            <div id="buttonContainer">
                <button onclick="appendToDrink(friesAmount)" , id="add">+</button>
                <button onclick="deductFromDrink(friesAmount)" , id="sub">-</button>
            </div>

        </div>

        <button onclick="ClearStorage()" , id="clearButton">Clear</button>
        <button id="themeToggle">SWITCH TO CYBERPUNK</button>

        <button id="openSettings">Adjust Prices</button>

        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <h3>Prices (₺)</h3>
                <hr style="border: 0.5px solid #444; margin-bottom: 15px;">
                <div id="settingsGrid">
                    </div>
                <button id="closeSettings">Save and Close</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
